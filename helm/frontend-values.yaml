image:
  pullPolicy: Always

httpRoute:
  enabled: false

service:
  port: 8080

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 15
readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30

volumes:
  - name: client-tmp
    emptyDir: {}

volumeMounts:
  - name: client-tmp
    mountPath: /home/gamification/client_temp
